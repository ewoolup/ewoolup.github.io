<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ewool的私藏</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Personal Portal</p>
          <h1>ewool的私藏</h1>
        </div>
      </header>

      <section class="search-panel" aria-label="搜索">
        <form id="searchForm" class="search-form">
          <input
            id="searchInput"
            type="search"
            placeholder="搜索网站，或直接输入网址"
            autocomplete="off"
          />
          <button type="submit">打开</button>
        </form>
      </section>

      <section class="section-head">
        <div>
          <p class="eyebrow">Quick Links</p>
          <h2>常用链接</h2>
        </div>
      </section>

      <section id="linkGrid" class="link-grid" aria-live="polite"></section>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
