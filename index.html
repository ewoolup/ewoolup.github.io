<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简单静态导航栏</title>

<style>
    /* 页面初始化 */
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: "Microsoft YaHei", sans-serif;
        background:#f5f5f5;
    }

    /* 导航栏 */
    nav{
        background:#333;
    }

    nav ul{
        list-style:none;
        display:flex;
    }

    nav ul li{
        flex:1;
        text-align:center;
    }

    nav ul li a{
        display:block;
        color:white;
        text-decoration:none;
        padding:18px 0;
        transition:0.3s;
    }

    nav ul li a:hover{
        background:#4CAF50;
    }

    /* 内容区域 */
    .content{
        padding:40px;
        text-align:center;
    }
</style>

</head>
<body>

<!-- 导航栏 -->
<nav>
    <ul>
        <li><a href="#">首页</a></li>
        <li><a href="#">新闻</a></li>
        <li><a href="#">产品</a></li>
        <li><a href="#">关于我们</a></li>
        <li><a href="#">联系我们</a></li>
    </ul>
</nav>

<!-- 页面内容 -->
<div class="content">
    <h1>欢迎来到我的网站</h1>
    <p>这是一个简单的静态网页导航栏示例。</p>
</div>

</body>
</html>
