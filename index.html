<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网址导航</title>

<link rel="icon" href="https://www.image2url.com/r2/default/images/1783341148536-94d9ba60-4781-48f0-8b60-f409664c241a.ico" sizes="32x32" type="image/png">    

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f4f6f9;
    font-family:"微软雅黑",sans-serif;
}

.header{
    width:95%;
    margin:30px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:32px;
}

.search input{
    width:300px;
    height:42px;
    border-radius:20px;
    border:1px solid #ddd;
    padding-left:20px;
    outline:none;
}

.container{
    width:95%;
    margin:auto;
}

.grid{

    display:grid;

    grid-template-columns:repeat(9,1fr);

    gap:15px;
}

.card{

    background:#fff;

    border-radius:10px;

    border:1px solid #e5e5e5;

    height:110px;

    text-decoration:none;

    color:#333;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    transition:.3s;
}

.card:hover{

    transform:translateY(-5px);

    box-shadow:0 8px 18px rgba(0,0,0,.15);
}

.card img{

    width:42px;

    height:42px;

    margin-bottom:12px;
}

.card span{

    font-size:16px;
}
</style>

</head>

<body>

<div class="header">
<h1>🌍 网址导航</h1>

<div class="search">
<input placeholder="搜索网站">
</div>

</div>

<div class="container">

<div class="grid">

<span>mindvideo</span>
</a>
